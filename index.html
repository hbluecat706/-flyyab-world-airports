<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>نمونه فنی نقشه فرودگاه‌های ایران | FlyYab</title>
<meta name="theme-color" content="#edf5ff">
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://tile.openstreetmap.org">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
:root{
  --blue:#1769e8;--blue2:#0752c8;--ink:#10213c;--muted:#6d7890;
  --surface:rgba(255,255,255,.90);--line:rgba(20,82,180,.12);
  --shadow:0 22px 65px rgba(18,68,145,.16);--r:26px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif;background:#eef5fb;color:var(--ink)}
button,input,select{font:inherit}
button{cursor:pointer}
a{text-decoration:none;color:inherit}
.app{min-height:100vh;padding:18px}
.hero{
  max-width:1320px;margin:0 auto 16px;padding:24px 28px;border-radius:30px;
  color:#fff;background:
  radial-gradient(circle at 15% 25%,rgba(255,255,255,.18),transparent 24%),
  linear-gradient(135deg,#173e84,#1670e7 72%,#62b2ff);
  box-shadow:var(--shadow);overflow:hidden;position:relative
}
.hero:after{content:"";position:absolute;width:360px;height:360px;border:1px solid rgba(255,255,255,.16);border-radius:50%;left:-120px;bottom:-250px;box-shadow:0 0 0 55px rgba(255,255,255,.035),0 0 0 110px rgba(255,255,255,.025)}
.heroInner{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:22px}
.hero h1{margin:0;font-size:clamp(27px,4vw,48px);line-height:1.25}
.hero p{margin:8px 0 0;color:rgba(255,255,255,.8);max-width:700px}
.heroStat{display:flex;gap:10px;flex-wrap:wrap}
.pill{min-width:112px;padding:12px 16px;border-radius:18px;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(12px)}
.pill b{display:block;font-size:24px}.pill span{font-size:11px;color:rgba(255,255,255,.72)}

.workspace{
  max-width:1320px;height:min(790px,calc(100vh - 150px));min-height:650px;margin:auto;
  display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:14px
}
.mapCard,.panel{
  position:relative;border-radius:30px;overflow:hidden;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)
}
#map{width:100%;height:100%;background:#cde7ef}
.leaflet-control-attribution{font-size:9px!important}
.leaflet-popup-content-wrapper{border-radius:18px;box-shadow:0 14px 40px rgba(0,0,0,.17)}
.leaflet-popup-content{margin:14px 16px;min-width:210px}
.popupTitle{font-weight:900;font-size:14px;margin-bottom:2px}
.popupEn{font-size:10px;color:#7b8497;direction:ltr;text-align:right}
.popupCodes{display:flex;gap:6px;margin-top:9px;direction:ltr}
.popupCodes b{padding:5px 8px;border-radius:9px;background:#edf4ff;color:#0752c8}

.clusterFlyyab{background:transparent!important}
.clusterFlyyab div{
  width:44px;height:44px;margin:0;border-radius:50%;display:grid;place-items:center;
  color:#fff;font-weight:900;background:linear-gradient(135deg,#0a52c9,#2c87ff);
  border:3px solid rgba(255,255,255,.95);box-shadow:0 7px 20px rgba(0,69,173,.35)
}
.airportMarker{
  width:18px;height:18px;border-radius:50%;background:#2380f5;border:3px solid #fff;
  box-shadow:0 5px 14px rgba(0,70,170,.35)
}
.airportMarker.intl{width:22px;height:22px;background:#0752c8}

.mapToolbar{
  position:absolute;z-index:700;top:18px;right:18px;left:18px;display:flex;gap:9px;align-items:center;pointer-events:none
}
.searchBox{
  pointer-events:auto;flex:1;display:grid;grid-template-columns:44px 1fr auto;align-items:center;
  background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.9);backdrop-filter:blur(18px);
  border-radius:22px;padding:6px;box-shadow:0 13px 38px rgba(20,69,135,.18)
}
.searchBox input{border:0;outline:0;background:transparent;padding:11px 4px;min-width:0;color:var(--ink)}
.searchIcon{display:grid;place-items:center;font-size:21px;color:var(--blue)}
.filterBtn,.locateBtn,.fullscreenBtn{
  pointer-events:auto;border:0;background:#fff;color:var(--ink);border-radius:17px;min-width:48px;height:48px;
  box-shadow:0 10px 28px rgba(20,69,135,.17);font-weight:900
}
.filterBtn{padding:0 16px;background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff}
.mapActions{position:absolute;z-index:700;left:18px;bottom:18px;display:flex;gap:8px}
.resultBadge{position:absolute;z-index:700;right:18px;bottom:18px;background:rgba(10,28,56,.84);color:#fff;padding:9px 13px;border-radius:999px;backdrop-filter:blur(12px);font-size:12px}

.panel{display:flex;flex-direction:column}
.panelHead{padding:20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f7fbff)}
.panelHead h2{margin:0;font-size:22px}.panelHead p{margin:4px 0 0;color:var(--muted);font-size:12px}
.filters{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line)}
.filters select{width:100%;border:1px solid var(--line);background:#f7f9fc;border-radius:13px;padding:10px;outline:0;color:var(--ink)}
.list{overflow:auto;padding:10px;background:#f5f8fc}
.card{
  width:100%;text-align:right;border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;margin-bottom:9px;
  transition:.18s;position:relative
}
.card:hover,.card.active{transform:translateY(-1px);border-color:rgba(23,105,232,.35);box-shadow:0 12px 28px rgba(23,105,232,.11)}
.card h3{margin:0 0 2px;padding-left:64px;font-size:14px}
.card .en{direction:ltr;text-align:right;color:#8b94a6;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.code{position:absolute;left:12px;top:12px;direction:ltr;background:#edf4ff;color:#0752c8;padding:7px 9px;border-radius:10px;font-weight:950}
.meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.tag{background:#f1f3f7;color:#657087;border-radius:999px;padding:4px 8px;font-size:10px}
.tag.intl{background:#e8f7f0;color:#087448}
.cardActions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
.cardActions a,.cardActions button{border:0;border-radius:10px;padding:8px;font-size:10px;text-align:center}
.showMap{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff}
.route{background:#edf4ff;color:#0752c8}
.empty{padding:45px 15px;text-align:center;color:var(--muted)}

.sheetBackdrop{display:none}
.mobileHandle{display:none}
.detailSheet{display:none}

@media(max-width:900px){
  .app{padding:0;background:#fff}
  .hero{margin:0;border-radius:0;padding:18px 16px 20px;box-shadow:none}
  .heroInner{align-items:flex-start}.heroStat{display:none}
  .hero h1{font-size:28px}.hero p{font-size:13px}
  .workspace{display:block;height:auto;min-height:0}
  .mapCard{height:calc(100vh - 158px);min-height:620px;border-radius:0;border:0;box-shadow:none}
  .panel{display:none}
  .mapToolbar{top:14px;right:12px;left:12px;flex-wrap:wrap}
  .searchBox{order:1;width:100%;flex-basis:100%}
  .filterBtn{order:2;margin-right:auto}
  .mapActions{bottom:78px;left:12px}
  .resultBadge{bottom:18px;right:12px}
  .detailSheet{
    display:block;position:fixed;z-index:1800;left:0;right:0;bottom:0;max-height:78vh;
    background:rgba(255,255,255,.96);backdrop-filter:blur(22px);border-radius:26px 26px 0 0;
    transform:translateY(calc(100% - 62px));transition:.28s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 -18px 55px rgba(12,45,93,.22);overflow:hidden
  }
  .detailSheet.open{transform:translateY(0)}
  .mobileHandle{display:block;width:46px;height:5px;border-radius:99px;background:#cbd2de;margin:9px auto 4px}
  .sheetHead{display:flex;justify-content:space-between;align-items:center;padding:6px 16px 12px;border-bottom:1px solid var(--line)}
  .sheetHead strong{font-size:15px}.sheetHead span{font-size:11px;color:var(--muted)}
  .sheetList{max-height:calc(78vh - 58px);overflow:auto;padding:9px;background:#f5f8fc}
  .sheetBackdrop{display:block;position:fixed;z-index:1700;inset:0;background:rgba(3,18,42,.22);opacity:0;pointer-events:none;transition:.2s}
  .sheetBackdrop.open{opacity:1;pointer-events:auto}
}
@media(max-width:520px){
  .hero p{display:none}.hero{padding-bottom:16px}
  .mapCard{height:calc(100vh - 82px);min-height:610px}
  .searchBox{grid-template-columns:40px 1fr}.searchBox .filterBtn{display:none}
}
</style>
</head>
<body>
<main class="app">
  <section class="hero">
    <div class="heroInner">
      <div>
        <h1>نمونه فنی نقشه فرودگاه‌های ایران</h1>
        <p>نسخه آزمایشی معماری ابزار جهانی فلای‌یاب؛ با نقشه واقعی، خوشه‌بندی فرودگاه‌ها، جستجوی سریع و رابط واکنش‌گرا.</p>
      </div>
      <div class="heroStat">
        <div class="pill"><b id="totalStat">—</b><span>فرودگاه ثبت‌شده</span></div>
        <div class="pill"><b id="iataStat">—</b><span>دارای کد IATA</span></div>
      </div>
    </div>
  </section>

  <section class="workspace">
    <div class="mapCard">
      <div id="map"></div>
      <div class="mapToolbar">
        <div class="searchBox">
          <div class="searchIcon">⌕</div>
          <input id="search" type="search" autocomplete="off" placeholder="نام فرودگاه، شهر، استان، IATA یا ICAO">
          <button class="filterBtn" id="openResults">نتایج</button>
        </div>
      </div>
      <div class="mapActions">
        <button class="locateBtn" id="locate" title="موقعیت من">◎</button>
        <button class="fullscreenBtn" id="fullscreen" title="تمام‌صفحه">⛶</button>
      </div>
      <div class="resultBadge" id="resultBadge">در حال آماده‌سازی…</div>
    </div>

    <aside class="panel">
      <div class="panelHead"><h2>جستجوی پیشرفته</h2><p>فرودگاه موردنظر را انتخاب کنید یا روی نقشه ببینید.</p></div>
      <div class="filters">
        <select id="province"><option value="">همه استان‌ها</option></select>
        <select id="type">
          <option value="">همه انواع</option>
          <option value="international">بین‌المللی</option>
          <option value="domestic">داخلی و منطقه‌ای</option>
        </select>
      </div>
      <div class="list" id="desktopList"></div>
    </aside>
  </section>
</main>

<div class="sheetBackdrop" id="sheetBackdrop"></div>
<section class="detailSheet" id="detailSheet">
  <div class="mobileHandle"></div>
  <div class="sheetHead" id="sheetHead"><strong>نتایج فرودگاه‌ها</strong><span id="sheetCount">—</span></div>
  <div class="sheetList" id="mobileList"></div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

const $=id=>document.getElementById(id);
const normalize=s=>String(s||"").toLowerCase().replace(/ي/g,"ی").replace(/ك/g,"ک").replace(/\s+/g," ").trim();
const fa=n=>Number(n).toLocaleString("fa-IR");
let filtered=airports.slice(), activeId=null, userMarker=null;

$("totalStat").textContent=fa(airports.length);
$("iataStat").textContent=fa(airports.filter(a=>a.iata).length);

const map=L.map("map",{zoomControl:false,minZoom:3,worldCopyJump:true,preferCanvas:true}).setView([32.2,53.5],5);
L.control.zoom({position:"bottomright"}).addTo(map);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:18,attribution:"© OpenStreetMap contributors"
}).addTo(map);

const clusters=L.markerClusterGroup({
  chunkedLoading:true,chunkInterval:80,chunkDelay:20,
  showCoverageOnHover:false,spiderfyOnMaxZoom:true,removeOutsideVisibleBounds:true,
  maxClusterRadius:55,
  iconCreateFunction:c=>L.divIcon({html:`<div>${fa(c.getChildCount())}</div>`,className:"clusterFlyyab",iconSize:[44,44]})
});
map.addLayer(clusters);
const markerById=new Map();

function popup(a){
  return `<div class="popupTitle">${a.name}</div>
  <div class="popupEn">${a.en||""}</div>
  <div style="margin-top:7px;font-size:11px;color:#68758c">${a.city}، ${a.province}</div>
  <div class="popupCodes"><b>${a.iata||"—"}</b><b>${a.icao||"—"}</b></div>`;
}
function markerIcon(a){
  return L.divIcon({html:"<div></div>",className:`airportMarker ${a.type==="international"?"intl":""}`,iconSize:[22,22],iconAnchor:[11,11]});
}
function rebuildMarkers(rows){
  clusters.clearLayers();markerById.clear();
  const ms=rows.map(a=>{
    const m=L.marker([a.lat,a.lon],{icon:markerIcon(a),title:a.name});
    m.bindPopup(popup(a));
    m.on("click",()=>selectAirport(a.id,false));
    markerById.set(a.id,m);return m;
  });
  clusters.addLayers(ms);
}
function cardHTML(a){
  return `<button class="card ${activeId===a.id?"active":""}" data-id="${a.id}">
    <span class="code">${a.iata||"—"}</span>
    <h3>${a.name}</h3>
    <div class="en">${a.en||""}</div>
    <div class="meta">
      <span class="tag">${a.city}</span><span class="tag">${a.province}</span>
      <span class="tag ${a.type==="international"?"intl":""}">${a.type==="international"?"بین‌المللی":"داخلی"}</span>
    </div>
    <div class="cardActions">
      <span class="showMap">نمایش روی نقشه</span>
      <a class="route" href="${a.map}" target="_blank" rel="noopener" onclick="event.stopPropagation()">مسیریابی</a>
    </div>
  </button>`;
}
function renderLists(){
  const content=filtered.length?filtered.map(cardHTML).join(""):`<div class="empty">نتیجه‌ای پیدا نشد.</div>`;
  $("desktopList").innerHTML=content;$("mobileList").innerHTML=content;
  document.querySelectorAll(".card").forEach(el=>el.addEventListener("click",e=>{
    if(e.target.closest("a"))return;selectAirport(el.dataset.id,true);
  }));
  $("resultBadge").textContent=`${fa(filtered.length)} فرودگاه`;
  $("sheetCount").textContent=`${fa(filtered.length)} نتیجه`;
}
function selectAirport(id,fly=true){
  activeId=id;const a=airports.find(x=>x.id===id);if(!a)return;
  renderLists();
  const m=markerById.get(id);
  if(m){
    clusters.zoomToShowLayer(m,()=>{if(fly)map.flyTo([a.lat,a.lon],Math.max(map.getZoom(),9),{duration:.6});m.openPopup()});
  }
  if(innerWidth<=900)closeSheet();
}
function applyFilters(){
  const q=normalize($("search").value),p=$("province").value,t=$("type").value;
  filtered=airports.filter(a=>(!p||a.province===p)&&(!t||a.type===t)&&(!q||[a.name,a.en,a.city,a.province,a.iata,a.icao].some(v=>normalize(v).includes(q))));
  activeId=null;rebuildMarkers(filtered);renderLists();
  if(filtered.length&&q){
    const bounds=L.latLngBounds(filtered.map(a=>[a.lat,a.lon]));
    map.fitBounds(bounds.pad(.16),{maxZoom:9});
  }
}
const provinces=[...new Set(airports.map(a=>a.province).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"fa"));
$("province").insertAdjacentHTML("beforeend",provinces.map(p=>`<option>${p}</option>`).join(""));
$("search").addEventListener("input",()=>{clearTimeout(window.__deb);window.__deb=setTimeout(applyFilters,160)});
$("province").addEventListener("change",applyFilters);$("type").addEventListener("change",applyFilters);

const sheet=$("detailSheet"),backdrop=$("sheetBackdrop");
function openSheet(){sheet.classList.add("open");backdrop.classList.add("open")}
function closeSheet(){sheet.classList.remove("open");backdrop.classList.remove("open")}
$("openResults").addEventListener("click",openSheet);$("sheetHead").addEventListener("click",()=>sheet.classList.toggle("open"));
backdrop.addEventListener("click",closeSheet);

$("locate").addEventListener("click",()=>{
  if(!navigator.geolocation)return alert("مرورگر شما موقعیت مکانی را پشتیبانی نمی‌کند.");
  navigator.geolocation.getCurrentPosition(pos=>{
    const ll=[pos.coords.latitude,pos.coords.longitude];
    if(userMarker)map.removeLayer(userMarker);
    userMarker=L.circleMarker(ll,{radius:8,color:"#fff",weight:3,fillColor:"#16a36a",fillOpacity:1}).addTo(map).bindPopup("موقعیت تقریبی شما").openPopup();
    map.flyTo(ll,9,{duration:.7});
  },()=>alert("دسترسی به موقعیت مکانی داده نشد."),{enableHighAccuracy:false,timeout:9000});
});
$("fullscreen").addEventListener("click",()=>{
  const el=document.querySelector(".mapCard");
  if(!document.fullscreenElement)el.requestFullscreen?.();else document.exitFullscreen?.();
});
document.addEventListener("fullscreenchange",()=>setTimeout(()=>map.invalidateSize(),220));

rebuildMarkers(filtered);renderLists();
setTimeout(()=>map.invalidateSize(),120);

function sendHeight(){
  try{parent.postMessage({type:"flyyab-airports-height",height:document.documentElement.scrollHeight},"*")}catch(e){}
}
new ResizeObserver(sendHeight).observe(document.body);
addEventListener("load",sendHeight);addEventListener("resize",()=>{map.invalidateSize();sendHeight()});
</script>
