function populateCountries(){const m=new Map;AIRPORTS.forEach(a=>m.set(a.country,a.country_name));[...m].sort((a,b)=>a[1].localeCompare(b[1],'fa')).forEach(([k,v])=>$('#countryFilter').insertAdjacentHTML('beforeend',`<option value="${k}">${v}</option>`))}
function render(){const q=normalize($('#searchInput').value),c=$('#countryFilter').value,t=$('#typeFilter').value;filtered=AIRPORTS.filter(a=>(!c||a.country===c)&&(!t||a.type===t)&&(!q||normalize([a.name,a.en,a.city,a.country_name,a.iata,a.icao,a.region].join(' ')).includes(q)));$('#countStat').textContent=fa(filtered.length);$('#countryStat').textContent=fa(new Set(filtered.map(a=>a.country)).size);$('#iataStat').textContent=fa(filtered.filter(a=>a.iata).length);const list=filtered.slice(0,120);$('#results').innerHTML=list.map(a=>`<article class="airportCard" data-id="${a.id}"><div class="airportTop"><div><b>${a.name}</b><div class="airportMeta">${a.city}، ${a.country_name} · ${a.icao||'—'}</div></div><span class="code">${a.iata||'—'}</span></div></article>`).join('')+(filtered.length>120?`<div class="airportMeta">نمایش ۱۲۰ نتیجه اول؛ جست‌وجو را دقیق‌تر کنید.</div>`:'');document.querySelectorAll('.airportCard').forEach(x=>x.onclick=()=>openAirport(x.dataset.id));renderMarkers()}
function renderMarkers(){cluster.clearLayers();markers.clear();filtered.forEach(a=>{const m=L.marker([a.lat,a.lon],{icon:icon(),title:a.en}).on('click',()=>showDetails(a));markers.set(a.id,m);cluster.addLayer(m)})}
function openAirport(id){const a=AIRPORTS.find(x=>x.id===id);if(!a)return;map.setView([a.lat,a.lon],Math.max(map.getZoom(),7),{animate:true});showDetails(a)}
function showDetails(a){$('#detailsContent').innerHTML=`<span class="detailCode">${a.iata||'بدون IATA'} · ${a.icao||'—'}</span><h2>${a.name}</h2><div class="en">${a.en||''}</div><div class="detailGrid"><div><span>شهر</span><b>${a.city||'—'}</b></div><div><span>کشور</span><b>${a.country_name||'—'}</b></div><div><span>نوع</span><b>${a.type==='international'?'بین‌المللی':'داخلی/منطقه‌ای'}</b></div><div><span>ارتفاع</span><b>${a.elevation_ft||'—'} ft</b></div><div><span>عرض جغرافیایی</span><b>${Number(a.lat).toFixed(4)}</b></div><div><span>طول جغرافیایی</span><b>${Number(a.lon).toFixed(4)}</b></div></div><div class="detailActions"><a target="_blank" href="https://www.google.com/maps/search/?api=1&query=${a.lat},${a.lon}">مسیریابی</a><a href="#${a.iata||a.id}" onclick="navigator.clipboard?.writeText(location.href.split('#')[0]+'#${a.iata||a.id}')">کپی لینک</a></div>`;$('#details').classList.add('open');history.replaceState(null,'','#'+(a.iata||a.id))}
$('#closeDetails').onclick=()=>$('#details').classList.remove('open');['searchInput','countryFilter','typeFilter'].forEach(id=>$('#'+id).addEventListener(id==='searchInput'?'input':'change',render));$('#resetBtn').onclick=()=>{$('#searchInput').value='';$('#countryFilter').value='';$('#typeFilter').value='';render()};$('#themeBtn').onclick=()=>document.body.classList.toggle('light');$('#locateBtn').onclick=()=>map.locate({setView:true,maxZoom:9});document.addEventListener('keydown',e=>{if(e.key==='/'&&document.activeElement!==$('#searchInput')){e.preventDefault();$('#searchInput').focus()}if(e.key==='Escape')$('#details').classList.remove('open')});AIRPORTS=window.__AIRPORTS__;populateCountries();render();const hash=decodeURIComponent(location.hash.slice(1)).toUpperCase();if(hash){const a=AIRPORTS.find(x=>(x.iata||'').toUpperCase()===hash||x.id===hash.toLowerCase());if(a)setTimeout(()=>openAirport(a.id),300)}
</script></body></html>
